<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDM.XYZ - 4 Axis CAM</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="sidebar">
        <h1><a href="https://github.com/alextreseder/wedm.xyz" target="_blank">WEDM.XYZ</a> - 4 axis CAM</h1>

        <div class="sidebar-section">
            <h2>Part Definition (Rectangle)</h2>
            <label for="origin-x">Origin X (mm):</label>
            <input type="number" id="origin-x" value="0">

            <label for="origin-y">Origin Y (mm):</label>
            <input type="number" id="origin-y" value="0">

            <label for="width">Width (mm):</label>
            <input type="number" id="width" value="50">

            <label for="height">Height (mm):</label>
            <input type="number" id="height" value="30">

            <label for="z-top">Z Top (mm):</label>
            <input type="number" id="z-top" value="20">

            <label for="part-thickness">Part Thickness (mm):</label>
            <input type="number" id="part-thickness" value="10">
        </div>

        <div class="sidebar-section">
            <h2>Object Interaction</h2>
            <button id="select-top-face-btn">Select Top Face</button>
        </div>

        <div class="sidebar-section">
            <h2>Machining Parameters</h2>
            <label for="wire-diameter">Wire Diameter (mm):</label>
            <input type="number" id="wire-diameter" value="0.25" step="0.01">

            <label for="cut-type">Cut Type:</label>
            <select id="cut-type">
                <option value="external">External Cut (Profile)</option>
                <option value="internal">Internal Cut (Pocket)</option>
            </select>

            <label for="taper-angle">Taper Angle (degrees):</label>
            <input type="number" id="taper-angle" value="5">
            <small>+ve: Bottom smaller (external), Bottom larger (internal)</small>
            <small>-ve: Bottom larger (external), Bottom smaller (internal)</small>

            <label for="feed-rate">Feed Rate (mm/min):</label>
            <input type="number" id="feed-rate" value="100">
        </div>

        <div class="sidebar-section">
            <h2>Generate</h2>
            <button id="generate-paths-btn">Generate Paths & G-Code</button>
            <button id="clear-paths-btn" class="secondary">Clear Paths</button>
        </div>
        
        <!-- Old buttons, to be removed or integrated if still needed -->
        <!-- <button id="select-top-face-btn">Select Top Face</button> -->
        <!-- <button id="select-lead-in-btn">Select Lead In</button> -->
    </div>

    <div id="main-content">
        <div id="top-bar">
            <span id="view-title">3D View</span> 
            <div id="top-bar-buttons">
                <button id="load-gear-btn">Load Test Case (Gear)</button>
                <button id="load-loft-btn">Load Test Case (Loft)</button>
                <button id="load-stl-btn">Load STL (Optional)</button>
            </div>
        </div>
        <div id="viewport-container">
            <div id="view-3d" class="view-panel">
                <!-- 3D view content will be managed by Three.js -->
            </div>
            <div id="view-2d" class="view-panel" style="display: none;">
                <canvas id="canvas-2d"></canvas>
            </div>
            <div id="gcode-editor" class="view-panel" style="display: none;">
                <textarea placeholder="G-Code will appear here..."></textarea>
            </div>
            <div id="viewport-modes">
                <button id="mode-3d-btn" class="active">3D</button>
                <button id="mode-2d-btn" class="view-mode-btn">2D View</button>
                <button id="mode-gcode-btn" class="view-mode-btn">G-Code</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
